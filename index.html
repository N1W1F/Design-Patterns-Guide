<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<body>

<canvas id="star-canvas"></canvas>

<nav class="navbar">
  <!-- Brand -->
  <div class="navbar-brand" onclick="window.location.hash='home'">
    <div class="brand-orb">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="4" fill="#7aafff"/>
        <circle cx="12" cy="12" r="8" stroke="#7aafff" stroke-width="1.5" opacity="0.35"/>
        <circle cx="12" cy="12" r="11" stroke="#7aafff" stroke-width="0.75" opacity="0.18"/>
      </svg>
    </div>
    <div class="brand-text">
      <span class="brand-name" id="brand-name">Design Patterns</span>
      <span class="brand-sub" id="brand-sub">CPIT 252</span>
    </div>
  </div>

  <!-- Nav Links -->
  <ul class="nav-links">
    <li class="nav-link active" data-route="home" id="nav-home" onclick="window.location.hash='home'">Home</li>
    <li class="nav-link" data-route="reference" id="nav-ref" onclick="window.location.hash='reference'">Reference</li>
    <li class="nav-link" data-route="identify" id="nav-id" onclick="window.location.hash='identify'">Identifier</li>
    <li class="nav-link" data-route="trial" id="nav-trial" onclick="window.location.hash='trial'">Mock Exam</li>
    <li class="nav-link nav-link-extra" data-route="compare" id="nav-compare" onclick="window.location.hash='compare'">⇄</li>
    <li class="nav-link nav-link-extra" data-route="achievements" id="nav-ach" onclick="window.location.hash='achievements'">🏆</li>
  </ul>

  <!-- Right Controls -->
  <div class="nav-right">
    <!-- Search -->
    <div class="nav-search-btn" id="nav-search-btn" onclick="Palette.open()">
      <span id="search-text">Search</span>
      <span class="nav-kbd">⌘K</span>
    </div>

    <!-- Language Toggle -->
    <div class="lang-toggle">
      <button class="lang-btn active" data-l="ar" onclick="setLang('ar')">ع</button>
      <button class="lang-btn" data-l="en" onclick="setLang('en')">EN</button>
    </div>

    <!-- Theme Toggle -->
    <button class="icon-btn" id="theme-btn" onclick="setTheme(THEME==='dark'?'light':'dark')" title="Toggle theme">☀</button>
  </div>

  <div class="scroll-progress">
    <div class="scroll-progress-fill" id="scroll-prog" style="width:0%"></div>
  </div>
</nav>

<div id="app"></div>

<!-- Data -->
<script src="data/patterns-part1.js"></script>
<script src="data/patterns-part2.js"></script>
<script src="data/patterns-part3.js"></script>

<script src="data/extras-part1.js"></script>

<script src="data/en-content.js"></script>
<script src="data/deep-dive.js"></script>
<script src="data/en-extras.js"></script>
<script src="data/extensions.js"></script>

<!-- App -->

<script src="js/effects.js"></script>
